ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ demircandemir.com.ApplicationKt.module ]
    }
    environment = development
    environment = ${?KTOR_ENV}
}

database {
    host = "localhost"
    port = "5432"
    name = "stylishdatabase"
    user = "postgres"
    password = "1852"
    maxPoolSize = 3
}

jwt {
    secret = ""
    issuer = "http://localhost:8080/"
    audience = "stylish-app-users"
    realm = "StyleApp"
}

application {
    baseUrl = "http://localhost:8080"
    environment = "dev" # Değiştirilebilir: "dev", "staging", "production"
}

email {
    smtp {
        host = "smtp.gmail.com"
        port = "587"
        user = "your.email@gmail.com" # Gmail hesabınızı girin
        password = "your-app-password" # Gmail uygulama şifrenizi girin
    }
    sender = "no-reply@stylish-app.com"
}