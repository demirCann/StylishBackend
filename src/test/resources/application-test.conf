ktor {
    deployment {
        port = 8081 # Use a different port for tests if needed
        # port = ${?PORT} # Typically not needed for test conf
    }
    application {
        # Might need specific test modules or keep the main one
        modules = [ demircandemir.com.ApplicationKt.module ]
    }
}

database {
    # H2 in-memory is good for testing
    url = "jdbc:h2:mem:test_db_${random.uuid4()};DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=FALSE"
    driver = "org.h2.Driver"
    user = "sa"
    password = ""
    maxPoolSize = 5 # Can adjust pool size for tests
}

jwt {
    secret = "test-secret-key-please-replace-in-prod"
    issuer = "http://localhost:8081/" # Match test port if changed
    audience = "test-users"
    realm = "StylishBackendApp Test Realm"
    access_token_expiration_minutes = 5 # Shorter expiration for tests might be useful
    refresh_token_expiration_days = 1   # Shorter expiration for tests
}
